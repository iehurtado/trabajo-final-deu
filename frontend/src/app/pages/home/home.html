<main>
  <h1 class="visually-hidden">Home</h1>
  <app-map id="map">
    <ng-template appMapPanel>
      @if (panel(); as panel) {
        <div class="d-flex justify-content-end">
          <button class="btn btn-close btn-sm" aria-label="Cerrar" (click)="closePanel()"></button>
        </div>
        <ng-container *ngComponentOutlet="panel.component; inputs: panel.inputs"></ng-container>
      } @else {
        <fa-icon [icon]="faInfoCircle" alt=""/>
        Seleccione un marcador en el mapa para ver la información disponible
      }
    </ng-template>
    @for (marcador of marcadores(); track marcador) {
      <app-map-marker [latlng]="[marcador.lat, marcador.long]"
        [options]="{ title: marcador.nombre, icon: marcador.icono }"
        (popup)="onPopupOpened($event, marcador)">
        <ng-template appMapPopup>
          <div></div>
        </ng-template>
      </app-map-marker>
    }
  </app-map>
</main>
