<button class="nav-link px-sm-2 py-2 px-0" title="Configuración" (click)="open(content)">
  <fa-icon class="d-none d-sm-inline" [icon]="faCog" alt="" />
  <span class="d-inline d-sm-none">Configuración</span>
</button>
<ng-template #content let-offcanvas>
	<div class="offcanvas-header">
		<h4 class="offcanvas-title" id="offcanvas-basic-title">Configuración</h4>
		<button type="button" class="btn-close" aria-label="Cerrar" (click)="offcanvas.dismiss()"></button>
	</div>
	<div class="offcanvas-body">
		<div class="mb-3">
        <label for="fontSizeRange" class="form-label">
            Tamaño de letra: <strong>{{ settings.fontSize() }}%</strong>
            @if (settings.fontSize() !== 100) {
                <button class="btn btn-link p-0 ms-2" (click)="settings.resetFontSize()" title="Restablecer predeterminado">
                    <fa-icon [icon]="faRotateLeft"></fa-icon>
                </button>
            }
        </label>
        <input ngbAutofocus type="range" class="form-range" id="fontSizeRange" min="50" max="200" step="5"
            [ngModel]="settings.fontSize()" (ngModelChange)="settings.setFontSize($event)">
        <div class="form-text text-muted d-flex justify-content-between small">
          <div>Pequeña (50%)</div>
          <div>Grande (200%)</div>
        </div>
    </div>
    <fieldset aria-labelledby="labelTema" class="mb-3">
      <label id="labelTema" class="form-label d-block">Tema</label>
      <div class="btn-group d-flex">
        <input type="radio" class="btn-check" name="tema" id="temaClaro" autocomplete="off"
          [value]="false" [ngModel]="darkModeSetting.isDarkMode()" (ngModelChange)="darkModeSetting.setDarkMode($event)">
        <label class="btn btn-outline-primary" for="temaClaro">Claro</label>
        <input type="radio" class="btn-check" name="tema" id="temaOscuro" autocomplete="off"
          [value]="true" [ngModel]="darkModeSetting.isDarkMode()" (ngModelChange)="darkModeSetting.setDarkMode($event)">
        <label class="btn btn-outline-primary" for="temaOscuro">Oscuro</label>
      </div>
    </fieldset>
    <div class="mb-3">
      <label class="form-label">Diálogo de Bienvenida</label>
      <div class="form-checkbox">
        <input type="checkbox" id="welcomeDontShow" class="form-check-input"
          [ngModel]="welcome.dontShowAgain()" (ngModelChange)="welcome.setDontShowAgain($event)">
        <label for="welcomeDontShow" class="form-check-label text-muted">No mostrar diálogo de bienvenida</label>
      </div>
    </div>
	</div>
</ng-template>
