@if (this.auth.user(); as user) {
  <div ngbDropdown role="menu" title="Menú de Usuario">
    <button #toggler type="button" class="nav-link" ngbDropdownToggle>
      <span class="d-none d-sm-inline">{{ user.fullname }}</span>
      <img ngSrc="assets/user.svg" width="32" height="32" class="rounded-circle bg-light border" alt="Avatar">
      @if (working()) {
        <span class="spinner-border spinner-border-sm" role="status"></span>
      }
    </button>
    <div ngbDropdownMenu [ariaLabelledByElements]="[toggler]">
      <div class="p-3">
        <div class="d-flex align-items-center gap-3">
          <div>
            <div class="fw-bold text-nowrap">{{ user.fullname }}</div>
            <div class="small text-muted">{{ user.email }}</div>
          </div>
          <img ngSrc="assets/user.svg" width="48" height="48" alt="Avatar" class="rounded-circle bg-light border" alt="Avatar">
        </div>
      </div>
      <div class="dropdown-divider m-0"></div>
      <button ngbDropdownItem class="p-2" (click)="logout()">
        <fa-icon [icon]="faRightFromBracket"></fa-icon>
        Cerrar Sesión
      </button>
    </div>
  </div>
} @else {
  <button class="btn" (click)="login()">Iniciar Sesión</button>
  <a class="btn btn-primary" routerLink="/signup">Crear Cuenta</a>
}
