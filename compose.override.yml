services:
  backend:
    image: trabajo-final-deu/backend:dev
    build:
      dockerfile: backend/Dockerfile
      context: .
      target: dev
    environment:
      NODE_ENV: development
    ports:
      - 127.0.0.1:3000:3000
    volumes:
      - .:/home/node/app:ro
      - ./backend:/home/node/app/backend
  frontend:
    image: trabajo-final-deu/frontend:dev
    build:
      dockerfile: frontend/Dockerfile
      context: .
      target: dev
    environment:
      BACKEND_HOST: backend
    ports:
      - 127.0.0.1:4200:4200
    volumes:
      - .:/home/node/app:ro
      - ./frontend:/home/node/app/frontend
