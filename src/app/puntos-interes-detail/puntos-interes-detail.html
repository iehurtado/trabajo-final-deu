<div class="container-fluid">
    <h1>Punto de Interés #{{ punto.id }}</h1>
    <div class="row g-2">
        <div class="col-12 col-md-4">
            <div class="card">
                <div class="card-header">
                    Información Básica
                    <button type="button" class="btn btn-link align-bottom px-0 py-0">
                        <span class="visually-hidden">Editar información básica</span>
                        <fa-icon [icon]="faPencilAlt"></fa-icon>
                    </button>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="pid-nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="pid-nombre" [value]="punto.nombre" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="pid-categoria" class="form-label">Categoría</label>
                        <input type="text" class="form-control" id="pid-categoria" [value]="punto.categoria" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="pid-subcategoria" class="form-label">Subcategoría</label>
                        <input type="text" class="form-control" id="pid-subcategoria" [value]="punto.subcategoria" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="pid-descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="pid-descripcion" readonly>{{punto.descripcion}}</textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-8">
            <div class="card">
                <div class="card-header">
                    Ubicación
                    <button type="button" class="btn btn-link align-bottom px-0 py-0">
                        <span class="visually-hidden">Editar ubicación</span>
                        <fa-icon [icon]="faPencilAlt"></fa-icon>
                    </button>
                </div>
                <div class="card-body p-0">
                    <app-map [puntos]="mapPuntos" [center]="mapCenter" [zoom]="15"></app-map>
                </div>
            </div>
        </div>
    </div>
</div>
<app-fixed-footer>
    <div class="d-flex justify-content-end w-100">
        <div class="ms-auto">
            <a role="button" class="btn btn-primary" [routerLink]="['/puntos']">Volver</a>
        </div>
    </div>
</app-fixed-footer>
